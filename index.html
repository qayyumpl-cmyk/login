<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">
    <h3 class="text-center mb-3">Login</h3>
    <form id="loginForm">
      <input class="form-control mb-2" type="text" id="username" placeholder="Username" required>
      <input class="form-control mb-3" type="password" id="password" placeholder="Password" required>
      <button class="btn btn-success w-100">Login</button>
      <p class="mt-3 text-center">No account? <a href="register.html">Register</a></p>
    </form>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA3YC8ablDpa_UbQnWMIU0HQ9aB9-I8lfQ",
    authDomain: "login-76925.firebaseapp.com",
    databaseURL: "https://login-76925-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "login-76925",
    storageBucket: "login-76925.firebasestorage.app",
    messagingSenderId: "766347817413",
    appId: "1:766347817413:web:8e060b2d17a4625fea9bac",
    measurementId: "G-7QSTKY7Y1Q"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const loginForm = document.getElementById("loginForm");
  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const usernameVal = document.getElementById("username").value;
    const passwordVal = document.getElementById("password").value;

    try {
      const usersRef = collection(db, "users");
      const q = query(usersRef, where("username", "==", usernameVal), where("password", "==", passwordVal));
      const snapshot = await getDocs(q);

      if (!snapshot.empty) {
        const userDoc = snapshot.docs[0];
        const user = userDoc.data();
        user.id = userDoc.id;
        localStorage.setItem("currentUser", JSON.stringify(user));
        window.location.href = "main.html";
      } else {
        alert("Invalid username or password!");
      }
    } catch (err) {
      console.error(err);
      alert("Error logging in!");
    }
  });
</script>
</body>
</html>
