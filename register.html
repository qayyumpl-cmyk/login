<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">
    <h3 class="text-center mb-3">Registration</h3>
    <form id="regForm">
      <input class="form-control mb-2" type="text" id="name" placeholder="Full Name" required>
      <input class="form-control mb-2" type="text" id="matrixNo" placeholder="Matrix Number" required>
      <input class="form-control mb-2" type="text" id="course" placeholder="Course/Program" required>
      <input class="form-control mb-2" type="email" id="email" placeholder="Email" required>
      <input class="form-control mb-2" type="text" id="username" placeholder="Username" required>
      <input class="form-control mb-3" type="password" id="password" placeholder="Password" required>
      <button class="btn btn-primary w-100">Register</button>
      <p class="mt-3 text-center">Already have account? <a href="login.html">Login</a></p>
    </form>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA3YC8ablDpa_UbQnWMIU0HQ9aB9-I8lfQ",
    authDomain: "login-76925.firebaseapp.com",
    databaseURL: "https://login-76925-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "login-76925",
    storageBucket: "login-76925.firebasestorage.app",
    messagingSenderId: "766347817413",
    appId: "1:766347817413:web:8e060b2d17a4625fea9bac",
    measurementId: "G-7QSTKY7Y1Q"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const regForm = document.getElementById("regForm");
  regForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
      name: document.getElementById("name").value,
      matrixNo: document.getElementById("matrixNo").value,
      course: document.getElementById("course").value,
      email: document.getElementById("email").value,
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    };

    try {
      const usersRef = collection(db, "users");
      const q = query(usersRef, where("username", "==", data.username));
      const snapshot = await getDocs(q);

      if (!snapshot.empty) {
        alert("Username already exists!");
        return;
      }

      await addDoc(usersRef, data);
      alert("Registration successful!");
      window.location.href = "index.html";
    } catch (err) {
      console.error(err);
      alert("Error registering user!");
    }
  });
</script>
</body>
</html>
