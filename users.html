<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registered Users</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">
    <h3 class="mb-3">Registered Users</h3>
    <button class="btn btn-success mb-3" onclick="showAdd()">Add User</button>
    <a href="main.html" class="btn btn-secondary mb-3">Back</a>
    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th>Name</th>
          <th>Matrix No</th>
          <th>Course</th>
          <th>Email</th>
          <th>Username</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="userTable"></tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="userModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h4 id="modalTitle"></h4>
      <input class="form-control mb-2" id="mName" placeholder="Name">
      <input class="form-control mb-2" id="mMatrixNo" placeholder="Matrix Number">
      <input class="form-control mb-2" id="mCourse" placeholder="Course">
      <input class="form-control mb-2" id="mEmail" placeholder="Email">
      <input class="form-control mb-2" id="mUsername" placeholder="Username">
      <input class="form-control mb-3" id="mPassword" placeholder="Password">
      <button class="btn btn-primary" onclick="saveUser()">Save</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, getDoc, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA3YC8ablDpa_UbQnWMIU0HQ9aB9-I8lfQ",
    authDomain: "login-76925.firebaseapp.com",
    databaseURL: "https://login-76925-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "login-76925",
    storageBucket: "login-76925.firebasestorage.app",
    messagingSenderId: "766347817413",
    appId: "1:766347817413:web:8e060b2d17a4625fea9bac",
    measurementId: "G-7QSTKY7Y1Q"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const usersCollection = collection(db, "users");

  let editId = null;
  const modal = new bootstrap.Modal(document.getElementById('userModal'));

  async function loadUsers() {
    const snapshot = await getDocs(usersCollection);
    const tbody = document.getElementById("userTable");
    tbody.innerHTML = "";
    snapshot.forEach((docSnap) => {
      const user = docSnap.data();
      tbody.innerHTML += `
        <tr>
          <td>${escapeHtml(user.name)}</td>
          <td>${escapeHtml(user.matrixNo || '-')}</td>
          <td>${escapeHtml(user.course || '-')}</td>
          <td>${escapeHtml(user.email)}</td>
          <td>${escapeHtml(user.username)}</td>
          <td>
            <button class="btn btn-warning btn-sm" onclick="editUser('${docSnap.id}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteUser('${docSnap.id}')">Delete</button>
          </td>
        </tr>
      `;
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;'}[m]));
  }

  window.showAdd = () => {
    editId = null;
    document.getElementById("modalTitle").innerText = "Add User";
    ['mName', 'mMatrixNo', 'mCourse', 'mEmail', 'mUsername', 'mPassword'].forEach(id => document.getElementById(id).value = "");
    modal.show();
  };

  window.saveUser = async () => {
    const userData = {
      name: document.getElementById("mName").value.trim(),
      matrixNo: document.getElementById("mMatrixNo").value.trim(),
      course: document.getElementById("mCourse").value.trim(),
      email: document.getElementById("mEmail").value.trim(),
      username: document.getElementById("mUsername").value.trim(),
      password: document.getElementById("mPassword").value
    };

    if (!userData.name || !userData.username || !userData.password) {
      alert("Please fill required fields");
      return;
    }

    try {
      if (editId) {
        await updateDoc(doc(db, "users", editId), userData);
      } else {
        await addDoc(usersCollection, userData);
      }
      modal.hide();
      loadUsers();
    } catch (err) {
      console.error(err);
      alert("Error saving user!");
    }
  };

  window.editUser = async (id) => {
    editId = id;
    const docSnap = await getDoc(doc(db, "users", id));
    if (docSnap.exists()) {
      const user = docSnap.data();
      document.getElementById("modalTitle").innerText = "Edit User";
      document.getElementById("mName").value = user.name || "";
      document.getElementById("mMatrixNo").value = user.matrixNo || "";
      document.getElementById("mCourse").value = user.course || "";
      document.getElementById("mEmail").value = user.email || "";
      document.getElementById("mUsername").value = user.username || "";
      document.getElementById("mPassword").value = user.password || "";
      modal.show();
    }
  };

  window.deleteUser = async (id) => {
    if (confirm("Delete this user?")) {
      try {
        await deleteDoc(doc(db, "users", id));
        loadUsers();
      } catch (err) {
        console.error(err);
        alert("Error deleting user!");
      }
    }
  };

  loadUsers();
</script>
</body>
</html>
